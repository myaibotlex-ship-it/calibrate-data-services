<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calibrate HCM Pricing Access</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: linear-gradient(135deg, #1a4b84 0%, #2a8a94 100%);
        color: #0f172a;
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 20px;
      }

      main {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.22);
        max-width: 420px;
        padding: 44px 38px;
        width: 100%;
      }

      h1 {
        color: #1e3a5f;
        font-size: 24px;
        line-height: 1.15;
        margin: 0;
      }

      p {
        color: #64748b;
        margin: 10px 0 26px;
      }

      label {
        color: #64748b;
        display: grid;
        font-size: 12px;
        font-weight: 800;
        gap: 7px;
        text-transform: uppercase;
      }

      input {
        border: 1px solid #dbe3ee;
        border-radius: 8px;
        color: #0f172a;
        font: inherit;
        padding: 13px 14px;
        width: 100%;
      }

      input:focus {
        border-color: #0d9488;
        box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
        outline: none;
      }

      button {
        background: linear-gradient(135deg, #1a4b84 0%, #2a8a94 100%);
        border: 0;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        margin-top: 16px;
        padding: 13px 16px;
        width: 100%;
      }

      .brand {
        color: #0d9488;
        display: block;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0;
        margin-bottom: 12px;
        text-transform: uppercase;
      }

      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        color: #b91c1c;
        display: none;
        font-size: 13px;
        font-weight: 700;
        margin: 0 0 14px;
        padding: 10px 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="brand">Calibrate HCM</span>
      <h1>Data Migration Pricing</h1>
      <p>Enter the access password to continue.</p>
      <div class="error" id="error">Invalid password. Please try again.</div>
      <form id="login-form">
        <input type="hidden" name="next" id="next" value="/" />
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />
        </label>
        <button type="submit">Access Calculator</button>
      </form>
    </main>
    <script>
      const PASSWORD = "Calibrate+PEPL";
      const AUTH_COOKIE = "calibrate_site_auth=calibrate-pepl-v1";
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next");
      if (next) document.getElementById("next").value = next;
      if (params.get("error")) document.getElementById("error").style.display = "block";

      document.getElementById("login-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const password = document.getElementById("password").value;
        const error = document.getElementById("error");

        if (password !== PASSWORD) {
          error.style.display = "block";
          return;
        }

        document.cookie = `${AUTH_COOKIE}; Path=/; Max-Age=604800; SameSite=Lax; Secure`;
        window.location.href = document.getElementById("next").value || "/";
      });
    </script>
  </body>
</html>
